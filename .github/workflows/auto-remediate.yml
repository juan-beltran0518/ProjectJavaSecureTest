---
name: "Security - Remediation Proposal PR"

on:
  workflow_dispatch:
    inputs:
      source-pr:
        description: 'Source PR number'
        required: true
        type: string
      source-run-id:
        description: 'Workflow run id that generated the vulnerability artifact'
        required: true
        type: string
      report-artifact-name:
        description: 'Artifact name that contains VULNERABILITIES.json'
        required: false
        default: 'security-vulnerabilities-report'
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  auto-remediate:
    name: "Create Remediation Proposal"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Vulnerability Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.report-artifact-name }}
          path: remediation-input
          run-id: ${{ inputs.source-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse Vulnerability Report
        id: parse-report
        run: |
          REPORT_PATH="remediation-input/VULNERABILITIES.json"
          if [ ! -f "$REPORT_PATH" ]; then
            echo "❌ No se encontró $REPORT_PATH"
            exit 1
          fi

          echo "Parsing vulnerability report..."
          CRITICAL=$(jq '.resumen.criticos' "$REPORT_PATH")
          HIGH=$(jq '.resumen.altos' "$REPORT_PATH")
          TOTAL=$(jq '.vulnerabilidades | length' "$REPORT_PATH")
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          cp "$REPORT_PATH" report.json

      - name: Prepare Fix Branch
        id: prep-branch
        run: |
          TIMESTAMP=$(date +%s)
          BRANCH_NAME="security/remediation-proposal-${TIMESTAMP}"
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          EMAIL="41898282+github-actions[bot]@users.noreply.github.com"
          git config user.email "$EMAIL"
          git checkout -b "$BRANCH_NAME"

      - name: Persist Remediation Proposal
        run: |
          mkdir -p .security
          cp report.json .security/remediation-proposal.json
          jq -r '
            [
              "# Propuesta de remediacion de seguridad",
              "",
              "Hallazgos totales: \(.resumen.total)",
              "Criticos: \(.resumen.criticos)",
              "Altos: \(.resumen.altos)",
              "",
              "## Hallazgos sugeridos",
              "",
              (.vulnerabilidades[] |
                "- [\(.severidad)] \(.titulo) @ \(.archivo):\(.linea)"
              )
            ] | join("\n")
          ' report.json > .security/remediation-summary.md
          git add .security/remediation-proposal.json .security/remediation-summary.md
          if ! git diff --cached --quiet; then
            MSG="fix(security): add remediation proposal from AI audit"
            MSG="$MSG"$'\n''Generated proposal only; no source files were changed automatically.'
            MSG="$MSG"$'\n''See .security/remediation-proposal.json and .security/remediation-summary.md'
            git commit -m "$MSG"
          fi

      - name: Push Branch and Create PR
        id: create-pr
        uses: actions/github-script@v7
        env:
          REPORT_FILE: report.json
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const REPORT = JSON.parse(
              fs.readFileSync(process.env.REPORT_FILE, 'utf8')
            );
            const BRANCH = '${{ steps.prep-branch.outputs.branch }}';
            try {
              execSync('git push --set-upstream origin ' + BRANCH, { stdio: 'inherit' });
            } catch (e) {
              console.log('Branch push failed or already exists');
            }
            const totalVulns = REPORT.vulnerabilidades.length;
            const criticos = REPORT.resumen.criticos;
            const altos = REPORT.resumen.altos;
            const title = 'security(proposal): remediation plan for ' + totalVulns +
              ' findings';
            const vulnList = REPORT.vulnerabilidades
              .map(v => '- ' + v.titulo + ' (' + v.severidad + ') in ' +
                v.archivo + ':' + v.linea)
              .join('\n');
            const body = '## Security remediation proposal\n\n' +
              'This PR packages the AI audit output as a remediation proposal.\n' +
              'It does not apply source-code fixes automatically.\n\n' +
              '### Summary\n\n' +
              '- Total Vulnerabilities: ' + totalVulns + '\n' +
              '- Critical: ' + criticos + '\n' +
              '- High: ' + altos + '\n\n' +
              '### Proposed Findings To Address\n\n' +
              vulnList + '\n\n' +
              '### Important Notes\n\n' +
              '1. Review required before merging\n' +
              '2. Manual implementation is still required\n' +
              '3. Validate critical issues manually\n\n' +
              '---\n\n' +
              'Source PR: #${{ inputs.source-pr }}';
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              head: BRANCH,
              base: context.payload.repository.default_branch,
              draft: true
            });
            console.log('PR created: #' + pr.data.number);
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.data.number,
              labels: ['security', 'ai-remediation', 'proposal']
            });
            core.setOutput('pr-number', pr.data.number);

      - name: Comment on Source PR
        if: always()
        uses: actions/github-script@v7
        env:
          REPORT_FILE: report.json
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            if (!fs.existsSync(process.env.REPORT_FILE)) {
              console.log('Report file not found');
              return;
            }
            const REPORT = JSON.parse(
              fs.readFileSync(process.env.REPORT_FILE, 'utf8')
            );
            const prNumber = '${{ steps.create-pr.outputs.pr-number }}';
            const sourcePrNumber = '${{ inputs.source-pr }}';
            if (!prNumber || prNumber === 'undefined') {
              console.log('No PR was created');
              return;
            }
            const comment = '## Security Remediation Proposal Available\n\n' +
              'Azure OpenAI identified ' +
              REPORT.vulnerabilidades.length + ' vulnerabilities ' +
              'and created [#' + prNumber +
              '](../../pull/' + prNumber +
              ') with a remediation proposal.\n\n' +
              'Review the proposal and implement or validate the changes manually.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(sourcePrNumber),
              body: comment
            });

      - name: Summary
        if: always()
        run: |
          echo "✅ Remediation proposal workflow completed"
